<div class="bg-primaryBg min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm m-6 p-8 bg-white rounded-2xl">
    <!-- Toggle Buttons -->
    <div class="grid grid-cols-2 mb-8 text-sm">
      <button
        class="w-full py-2 text-sm rounded-l-full bg-secondaryBg hover:bg-primaryBg hover:text-white transition duration-300 focus:outline-none"
        (click)="navigateToLogin()"
      >
        Login
      </button>
      <button
        class="w-full py-2 text-sm rounded-r-full bg-primaryBg text-white cursor-default pointer-events-none focus:outline-none"
        disabled
      >
        Register
      </button>
    </div>

    <!-- Registration Form -->
    <form (ngSubmit)="register()" class="flex flex-col gap-4">
      <!-- Email Input -->
      <div>
        <label for="email" class="text-xs">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="Enter your email"
          class="w-full py-2 text-sm border-b-2 border-slate-400 focus:border-primaryBg focus:outline-none focus:ring-0 transition duration-300"
        />
      </div>

      <!-- Password Input -->
      <div>
        <label for="password" class="text-xs">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="Enter your password"
          class="w-full py-2 text-sm border-b-2 border-slate-400 focus:border-primaryBg focus:outline-none focus:ring-0 transition duration-300"
        />
      </div>

      <!-- Confirm Password Input -->
      <div>
        <label for="confirmPassword" class="text-xs">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          placeholder="Confirm your password"
          class="w-full py-2 text-sm border-b-2 border-slate-400 focus:border-primaryBg focus:outline-none focus:ring-0 transition duration-300"
        />
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="text-center text-sm text-red-500">
        {{ errorMessage }}
      </div>

      <!-- Submit and Cancel Buttons -->
      <div class="flex flex-row mt-8 gap-4">
        <button
          type="submit"
          class="w-full py-2 text-sm bg-secondaryBg rounded-full hover:bg-primaryBg hover:text-white transition duration-300 focus:outline-none"
        >
          Register Now
        </button>
        <button
          (click)="navigateToHome()"
          type="button"
          class="w-full py-2 text-sm bg-cancelBg rounded-full hover:bg-primaryBg text-white transition duration-300 focus:outline-none"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
